name: ci

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: set up gradle
        uses: gradle/actions/setup-gradle@v4

      - name: check
        run: ./gradlew spotlessCheck test assemble
